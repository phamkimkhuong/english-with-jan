name: Deploy STT Service to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'stt-service/**'
      - '.github/workflows/deploy-stt.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STT_VPS_HOST }}
          username: ${{ secrets.STT_VPS_USERNAME }}
          key: ${{ secrets.STT_VPS_SSH_KEY }}
          port: ${{ secrets.STT_VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            echo "Running diagnostic script..."
            sudo -u stt /opt/english-with-jan-stt/.venv/bin/python -c "
            import jwt, cryptography, requests
            print('JWT version:', jwt.__version__)
            print('Cryptography version:', cryptography.__version__)
            r = requests.get('https://www.googleapis.com/robot/v1/metadata/x509/securetoken@system.gserviceaccount.com')
            certs = r.json()
            first_key = list(certs.keys())[0]
            cert = certs[first_key]
            print('Cert start:', cert[:50])
            try:
                from cryptography.x509 import load_pem_x509_certificate
                c = load_pem_x509_certificate(cert.encode('utf-8'))
                print('Certificate parsed successfully!')
            except Exception as e:
                print('Failed to parse cert:', e)
            "

      - name: Fetch logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STT_VPS_HOST }}
          username: ${{ secrets.STT_VPS_USERNAME }}
          key: ${{ secrets.STT_VPS_SSH_KEY }}
          port: ${{ secrets.STT_VPS_PORT || 22 }}
          script: |
            echo "=== SYSTEMD STT-SERVICE LOGS ==="
            sudo journalctl -u stt-service -n 120 --no-pager
            echo "=== MODELS DIRECTORY ==="
            ls -la /opt/english-with-jan-stt/models
            echo "=== RUNNING PRE-DOWNLOAD MANUALLY TO SEE ERROR ==="
            sudo -u stt /opt/english-with-jan-stt/.venv/bin/python -c "from faster_whisper import WhisperModel; WhisperModel('small.en', device='cpu', compute_type='int8', download_root='/opt/english-with-jan-stt/models')"



