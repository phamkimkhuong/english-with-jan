name: Deploy STT Service to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'stt-service/**'
      - '.github/workflows/deploy-stt.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STT_VPS_HOST }}
          username: ${{ secrets.STT_VPS_USERNAME }}
          key: ${{ secrets.STT_VPS_SSH_KEY }}
          port: ${{ secrets.STT_VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            echo "Starting deploy of English with Jan STT Service..."
            if [ -f /usr/local/bin/update-english-with-jan-stt-git ]; then
              sudo /usr/local/bin/update-english-with-jan-stt-git
            else
              echo "Symlink not found, running bootstrap update from source..."
              sudo /opt/english-with-jan-stt/deploy/oracle/update-from-git.sh
            fi

      - name: Fetch logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STT_VPS_HOST }}
          username: ${{ secrets.STT_VPS_USERNAME }}
          key: ${{ secrets.STT_VPS_SSH_KEY }}
          port: ${{ secrets.STT_VPS_PORT || 22 }}
          script: |
            echo "=== SYSTEMD STT-SERVICE LOGS ==="
            sudo journalctl -u stt-service -n 120 --no-pager
            echo "=== MODELS DIRECTORY ==="
            ls -la /opt/english-with-jan-stt/models


